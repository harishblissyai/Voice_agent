services:
  blissy-voice:
    build: .
    container_name: blissy-voice-bot
    ports:
      - "8080:8000"       # host:container — port 8080 (unused, added to security group)
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
